<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonGradient" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFF9E5" />
      <stop offset="40%" style="stop-color:#F7DC6F" />
      <stop offset="100%" style="stop-color:#D4AC0D" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0.5" dy="0.5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Corpo da Lua -->
  <circle cx="20" cy="20" r="18" fill="url(#moonGradient)" />
  
  <!-- Crateras (Simuladas com opacidade e filtros) -->
  <circle cx="12" cy="15" r="2.5" fill="#B7950B" opacity="0.4" filter="url(#shadow)" />
  <circle cx="25" cy="12" r="1.8" fill="#B7950B" opacity="0.3" filter="url(#shadow)" />
  <circle cx="28" cy="25" r="3" fill="#B7950B" opacity="0.35" filter="url(#shadow)" />
  <circle cx="15" cy="28" r="2" fill="#B7950B" opacity="0.3" filter="url(#shadow)" />
  <circle cx="20" cy="20" r="1.2" fill="#B7950B" opacity="0.25" filter="url(#shadow)" />
  <circle cx="10" cy="22" r="1" fill="#B7950B" opacity="0.2" filter="url(#shadow)" />
</svg>
